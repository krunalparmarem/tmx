# ==============================================================================
# TMX Agentic Workspace Configuration
# ==============================================================================

# Change prefix from default
unbind C-b
set-option -g prefix {{PREFIX}}
bind-key {{PREFIX}} send-prefix

# Start window and pane numbering at 1 (0 is too far on keyboard)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Intuitive Window Splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Agentic Power Features
# 1. Floating Scratchpad (Popup)
bind g display-popup -E "{{SHELL}}"
# 2. Synchronize Panes (Toggle)
bind s set-window-option synchronize-panes \; display-message -fg "#cba6f7" "🔗 Synchronize panes: #{?pane_synchronized,ON,OFF}"
# 3. Quick Search / Copy Mode (Requires vi mode to work properly)
setw -g mode-keys vi
bind / copy-mode \; send-keys ?
# 4. 1-Click Crash Reporting
bind S capture-pane -S - -E - \; run-shell "tmux save-buffer '#{pane_current_path}/tmx_crash.log'" \; delete-buffer \; display-message -fg "#89b4fa" "💾 Crash report saved → tmx_crash.log"
# 5. Quick Switcher Popup
bind w display-popup -E "TMX_SWITCH_POPUP=1 {{TMX_BIN}} switch"
# 6. Review Swarm — keep the best agent's work (merges its branch)
bind r display-popup -w 80% -h 80% -E "{{TMX_BIN}} review"

# ==============================================================================
# Phase 2: AI Developer Power Features
# ==============================================================================
# Infinite History
set-option -g history-limit 100000

# Instant Yank (Copy last 200 lines to clipboard)
bind y run-shell "tmux capture-pane -t '#{pane_id}' -S -200 -E - -p | {{CLIPBOARD_CMD}}" \; display-message -fg "#a6e3a1" "📋 Yanked 200 lines to clipboard!"

# Auto-Logger (Toggle stream pane output to file)
bind P if-shell -F '#{pane_pipe}' 'pipe-pane \; display-message -fg "#f9e2af" "🖨️  Auto-Logger OFF"' 'pipe-pane -o "cat >> '\''#{pane_current_path}/tmx-pane-#{pane_id}.log'\''" \; display-message -fg "#a6e3a1" "🖨️  Auto-Logger ON → tmx-pane-#{pane_id}.log"'

# Safe Lock Mode
bind L select-pane -d \; select-pane -P "bg=#45475a" \; display-message -fg "#f9e2af" "🔒 Pane LOCKED — Prefix+U to unlock"
bind U select-pane -e \; select-pane -P "bg=default" \; display-message -fg "#a6e3a1" "🔓 Pane UNLOCKED"

# ==============================================================================
# Repeatable Pane Switching
# ==============================================================================
# Allow 1 full second (1000ms) to repeat keys without hitting Prefix again
set-option -g repeat-time 1000

# Repeatable pane switching using Prefix + Arrows
bind -r Up select-pane -U
bind -r Down select-pane -D
bind -r Left select-pane -L
bind -r Right select-pane -R

# Repeatable pane switching using Prefix + Option + Arrows (Overrides default resize)
bind -r M-Up select-pane -U
bind -r M-Down select-pane -D
bind -r M-Left select-pane -L
bind -r M-Right select-pane -R

# Repeatable pane resizing using Prefix + Ctrl + Arrows
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5

# Instant Pane Switching (Option + Arrow Keys) - NO PREFIX NEEDED
# Note: Requires terminal to be configured to "Use Option as Meta"
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mouse Mode
set -g mouse on

# ==============================================================================
# "Training Wheels" (Mouse Event Bindings for Muscle Memory)
# ==============================================================================
# When clicking a pane to focus
bind-key -n MouseDown1Pane select-pane -t = \; display-message -d 0 -fg "#94e2d5" "Pro tip: Option+Arrows switches panes instantly!"
# When clicking a window in status bar
bind-key -n MouseDown1Status select-window -t = \; display-message -d 0 -fg "#94e2d5" "Pro tip: Prefix ({{PREFIX}}) + <number> switches windows!"
# When dragging a pane border to resize
bind-key -n MouseDrag1Border resize-pane -M \; display-message -d 0 -fg "#94e2d5" "Pro tip: Prefix ({{PREFIX}}) + Ctrl+Arrows resizes panes!"

# ==============================================================================
# Funky Window Tab Colors
# ==============================================================================
# Each window (tab) gets a unique @tab_color — used in the status bar and pane backgrounds.
# Hooks keep colors in sync when you create, split, or switch windows.
set-hook -g after-new-window 'run-shell "{{WINDOW_COLOR_SCRIPT}}"'
set-hook -g after-new-session 'run-shell "sleep 0.05; {{WINDOW_COLOR_SCRIPT}}"'
set-hook -g after-split-window 'run-shell "{{WINDOW_COLOR_SCRIPT}}"'
set-hook -g after-select-window 'run-shell "{{WINDOW_COLOR_SCRIPT}}"'

# ==============================================================================
# Aesthetics & Status Bar
# ==============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",Apple_Terminal:RGB"
set -g status-bg "#1e1e2e"
set -g status-fg white
set -g status-left-length 48
set -g status-left "#[fg=#a6e3a1,bold] 🤖 TMX [#{session_name}] #[fg=default] "
set -g status-right "#{?@tmx_swarm,#[fg=#f9e2af]🐝 #{@tmx_swarm} ,}#{?pane_synchronized,#[fg=#cba6f7]🔗 SYNC ,}#[fg=#cdd6f4]#{?pane_title,#{pane_title},#{pane_current_command}} #[fg=#f9e2af]%H:%M #[fg=#89b4fa]%d-%b-%y "

# Pane border titles (tmux 3.14+; harmless no-op on older versions)
set -g pane-border-status top
set -g pane-border-format "#{?pane_title,#[fg=#cba6f7]#{pane_title},#[fg=#6c7086]#{pane_index}}"

# Window tabs — each tab uses its own @tab_color (set by tmx-window-color.sh)
setw -g window-status-format "#[fg=#cdd6f4]#{?@tab_color,#[bg=#{@tab_color}],#[bg=#313244]} #I: #W #[default]"
setw -g window-status-current-format "#[fg=#1e1e2e,bold]#{?@tab_color,#[bg=#{@tab_color}],#[bg=#89b4fa]} #I: #W #F #[default]"
