# ==============================================================================
# TMX Agentic Workspace Configuration
# ==============================================================================

# Change prefix from default
unbind C-b
set-option -g prefix {{PREFIX}}
bind-key {{PREFIX}} send-prefix

# Start window and pane numbering at 1 (0 is too far on keyboard)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Intuitive Window Splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Agentic Power Features
# 1. Floating Scratchpad (Popup)
bind g display-popup -E "zsh"
# 2. Synchronize Panes (Toggle)
bind s set-window-option synchronize-panes\; display-message "Synchronize panes is now #{?pane_synchronized,ON,OFF}"
# 3. Quick Search / Copy Mode
bind / copy-mode \; send-key ?
# 4. 1-Click Crash Reporting
bind S capture-pane -S - -E - \; save-buffer "#{pane_current_path}/tmx_crash.log" \; delete-buffer \; display-message "Crash report saved to #{pane_current_path}/tmx_crash.log"
# 5. Quick Switcher Popup
bind w display-popup -E "tmx switch"

# ==============================================================================
# Phase 2: AI Developer Power Features
# ==============================================================================
# Infinite History
set-option -g history-limit 100000

# Instant Yank (Copy last 200 lines to clipboard)
bind y run-shell "tmux capture-pane -S -200 -E - -p | pbcopy" \; display-message "Last 200 lines yanked to clipboard!"

# Auto-Logger (Stream pane output to file)
bind P pipe-pane -o "cat >> #{pane_current_path}/tmx-pane-#{pane_id}.log" \; display-message "Toggled Auto-Logger (tmx-pane-#{pane_id}.log)"

# Safe Lock Mode
bind L select-pane -d \; set-window-option pane-active-border-style "fg=#f38ba8" \; display-message "Pane LOCKED (Keyboard disabled. Press Prefix+U to unlock)"
bind U select-pane -e \; set-window-option pane-active-border-style "fg=#89b4fa" \; display-message "Pane UNLOCKED"

# ==============================================================================
# Repeatable Pane Switching
# ==============================================================================
# Allow 1 full second (1000ms) to repeat keys without hitting Prefix again
set-option -g repeat-time 1000

# Repeatable pane switching using Prefix + Arrows
bind -r Up select-pane -U
bind -r Down select-pane -D
bind -r Left select-pane -L
bind -r Right select-pane -R

# Repeatable pane switching using Prefix + Option + Arrows (Overrides default resize)
bind -r M-Up select-pane -U
bind -r M-Down select-pane -D
bind -r M-Left select-pane -L
bind -r M-Right select-pane -R

# Instant Pane Switching (Option + Arrow Keys) - NO PREFIX NEEDED
# Note: Requires terminal to be configured to "Use Option as Meta"
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mouse Mode
set -g mouse on

# ==============================================================================
# "Training Wheels" (Mouse Event Bindings for Muscle Memory)
# ==============================================================================
# When clicking a pane to focus
bind-key -n MouseDown1Pane select-pane -t = \; display-message -d 0 "Pro tip: Use Option+Arrows to switch panes instantly!"
# When clicking a window in status bar
bind-key -n MouseDown1Status select-window -t = \; display-message -d 0 "Pro tip: Use Prefix ({{PREFIX}}) + <number> to switch windows!"
# When dragging a pane border to resize
bind-key -n MouseDrag1Border resize-pane -M \; display-message -d 0 "Pro tip: Use Prefix ({{PREFIX}}) + Ctrl+Arrows to resize panes!"

# ==============================================================================
# Aesthetics & Status Bar
# ==============================================================================
set -g default-terminal "screen-256color"
set -g status-bg "#1e1e2e"
set -g status-fg white
set -g status-left-length 40
set -g status-left "#[fg=#a6e3a1,bold] 🤖 TMX [#{session_name}] #[fg=default] "
set -g status-right "#[fg=#f9e2af]%H:%M #[fg=#89b4fa]%d-%b-%y "

# Active Window Styling
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I: #W "
setw -g window-status-format "#[fg=white,bg=#313244] #I: #W "
