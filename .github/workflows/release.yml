name: Release

# Build prebuilt binaries for macOS + Linux and attach them to the GitHub
# Release whenever a version tag (e.g. v0.3.0) is pushed. install.sh downloads
# these assets so users never need Rust/cargo to install tmx.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/tmx"
          asset="tmx-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "$(dirname "$bin")" tmx
          shasum -a 256 "$asset" > "$asset.sha256" 2>/dev/null || sha256sum "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tmx-${{ matrix.target }}.tar.gz
            tmx-${{ matrix.target }}.tar.gz.sha256
